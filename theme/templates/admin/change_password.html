{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-md rounded p-8 w-full max-w-lg">

        <h2 class="text-2xl font-bold mb-6 text-gray-800">Change Password</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="{{ form.new_password.id_for_label }}">
                    {{ form.new_password.label }}
                </label>
                {{ form.new_password }}
                {% if form.new_password.errors %}
                    <p class="text-red-500 text-sm mt-1">{{ form.new_password.errors|striptags }}</p>
                {% endif %}
            </div>

            {% for user in users %}
                <input type="hidden" name="_selected_action" value="{{ user.pk }}">
            {% endfor %}

            <input type="hidden" name="action" value="change_user_password">

            <button type="submit" name="apply"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded transition-all">
                Change Password
            </button>
        </form>

    </div>

</body>
</html>
