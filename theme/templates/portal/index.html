{% extends '../base.html' %}
{% load static %}
{% block title %}
    Saff
{% endblock title %}

{% block full_content %}
<div class="min-h-screen flex items-center justify-center px-2">
    <div class="w-full max-w-[600px] bg-white shadow-md border border-[#c3c4c7] p-8 h-max max-h-[90vh] overflow-y-auto scrollbar-hide">
        <div class="flex justify-center mb-4 sm:mb-6">
            {% if logo %}
            <a href="/" class="max-w-[120px] sm:max-w-[140px]">
                <img src="{{ logo.image.url }}" alt="Logo" class="h-16 object-contain">
            </a>
            {% else %}
            <a href="/">
                <span class="text-xl sm:text-2xl font-bold text-body text-center inline-block">South Asian Football Federation: SAFF</span>
            </a>
            {% endif %}
        </div>
        <h3 class="text-center">Portal unlocks with two options:</h3>
        <div class="mt-8 flex flex-col md:flex-row items-center justify-center gap-2 space-y-4 md:space-y-0">
            <div class="btn-wrap">
                <a href="{% url 'travel-claim-view' %}" class="bg-blue text-white text-lg sm:text-xl font-medium px-6 py-2 rounded-lg" aria-label="Travel Claim Form">Travel Claim Form</a>
            </div>
            <div class="btn-wrap">
                <a href="{% url 'bank-account-view' %}" class="bg-blue text-white text-lg sm:text-xl font-medium px-6 py-2 rounded-lg" aria-label="Bank Details Form">Bank Details Form</a>
            </div>
        </div>
    </div>
</div>
{% endblock full_content %}
