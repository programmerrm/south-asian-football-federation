{% extends '../base.html' %}
{% load static %}
{% block title %}
South Asian Football Federation: SAFF
{% endblock title %}

{% block full_content %}
<section>
    <div class="fixed inset-0 flex items-center justify-center bg-black/30 px-2">
        <div class="bg-white w-full max-w-[420px] rounded-2xl p-10 text-center shadow-xl ">

            <form method="POST">
                {% csrf_token %}

                <p class="text-base sm:text-lg text-gray-700 mb-5 sm:mb-7">
                    Are you sure to submit this form?
                </p>

                <div class="flex justify-center gap-3 sm:gap-6">
                    <button type="submit"
                        class="text-sm sm:text-base px-4 sm:px-6 py-2 border border-gray-400 rounded-lg hover:bg-gray-100">
                        Confirm
                    </button>

                    <a href="#"
                        class="text-sm sm:text-base px-4 sm:px-6 py-2 border border-gray-400 rounded-lg hover:bg-gray-100">
                        Download
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock full_content %}
